<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>TranspoBot · Connexion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
      font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Carte principale - responsive, ne déborde pas */
    .card {
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(0px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 4px 12px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* en-tête avec icône / titre */
    .hero {
      background: #0a2b3e;
      padding: 2rem 1.8rem 1.8rem 1.8rem;
      text-align: center;
      color: white;
    }

    .hero h1 {
      font-size: 2.2rem;
      letter-spacing: -0.3px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hero h1 span:first-child {
      background: #f4c542;
      color: #0a2b3e;
      font-size: 1.6rem;
      padding: 0 10px;
      border-radius: 60px;
      display: inline-block;
    }

    .hero p {
      font-size: 0.95rem;
      opacity: 0.8;
      margin-top: 0.5rem;
      font-weight: 400;
    }

    /* contenu formulaire */
    .form-container {
      padding: 2rem 1.8rem 2rem 1.8rem;
    }

    /* groupe de champs */
    .input-group {
      margin-bottom: 1.35rem;
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1f3b4c;
      margin-bottom: 0.4rem;
      letter-spacing: -0.2px;
    }

    .input-group input {
      padding: 0.9rem 1rem;
      font-size: 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 1.2rem;
      background-color: #fefefe;
      transition: 0.2s;
      font-family: inherit;
      width: 100%;
    }

    .input-group input:focus {
      outline: none;
      border-color: #f4c542;
      box-shadow: 0 0 0 3px rgba(244, 197, 66, 0.2);
    }

    /* bloc vérification humaine (recaptcha-like) */
    .human-check {
      background: #f8fafc;
      border: 1px solid #e2edf2;
      border-radius: 1.2rem;
      padding: 0.9rem 1rem;
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .human-label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      color: #1e2f3a;
      font-size: 0.9rem;
    }

    .fake-checkbox {
      width: 22px;
      height: 22px;
      background: white;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s;
      cursor: pointer;
    }

    .human-check.verified .fake-checkbox {
      background: #f4c542;
      border-color: #e0a800;
      position: relative;
    }

    .human-check.verified .fake-checkbox::after {
      content: "✓";
      font-size: 14px;
      font-weight: bold;
      color: #1e2f3a;
    }

    .human-hint {
      font-size: 0.8rem;
      color: #4a6a7f;
      background: #eef3f9;
      padding: 0.25rem 0.7rem;
      border-radius: 30px;
    }

    /* bouton de connexion */
    .login-btn {
      width: 100%;
      background: #0f2f3f;
      border: none;
      padding: 1rem;
      border-radius: 2rem;
      font-size: 1.05rem;
      font-weight: 600;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 1.2rem;
      font-family: inherit;
    }

    .login-btn:hover {
      background: #1e4b62;
      transform: scale(0.98);
    }

    /* mode invite + footer */
    .guest-mode {
      text-align: center;
      margin: 1.2rem 0 0.8rem 0;
    }

    .guest-link {
      background: none;
      border: none;
      color: #2c6e9e;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1rem 0 0.2rem;
      color: #a0bbcc;
      font-size: 0.7rem;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #dce7ef;
    }

    .footer-note {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.75rem;
      color: #5f7e95;
      border-top: 1px solid #ecf3f8;
      padding-top: 1.2rem;
    }

    /* deux boutons action (connexion / inscription) en ligne */
    .auth-switch {
      display: flex;
      gap: 12px;
      margin-bottom: 1.6rem;
    }

    .switch-btn {
      flex: 1;
      text-align: center;
      padding: 0.6rem 0;
      border-radius: 40px;
      font-weight: 600;
      background: #f1f5f9;
      color: #2c5a74;
      cursor: pointer;
      transition: 0.2s;
      border: none;
      font-size: 0.9rem;
    }

    .switch-btn.active {
      background: #0f2f3f;
      color: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    /* petite animation / retour */
    .toast-msg {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #facc15;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
      font-family: monospace;
    }

    @media (max-width: 500px) {
      body {
        padding: 0.8rem;
      }
      .form-container {
        padding: 1.5rem;
      }
      .hero h1 {
        font-size: 1.8rem;
      }
      .human-check {
        flex-direction: column;
        align-items: flex-start;
      }
      .toast-msg {
        white-space: normal;
        text-align: center;
        max-width: 90%;
        font-size: 0.75rem;
      }
    }

    /* éviter tout débordement horizontal */
    img, svg, .card, .input-group input {
      max-width: 100%;
    }

    button {
      background: none;
      border: none;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="hero">
    <h1>
      <span>🤖</span> TranspoBot
    </h1>
    <p>Gestion de transport par IA</p>
  </div>

  <div class="form-container">
    <!-- Connexion / Inscription toggle (pas de déformation, responsive) -->
    <div class="auth-switch" id="authSwitch">
      <button class="switch-btn active" data-mode="login">Connexion</button>
      <button class="switch-btn" data-mode="register">Inscription</button>
    </div>

    <!-- Formulaire unique qui change selon le mode -->
    <form id="mainForm" action="javascript:void(0);">
      <!-- Champ email commun -->
      <div class="input-group">
        <label>📧 Email</label>
        <input type="email" id="email" placeholder="exemple@ucad.edu.sn" required autocomplete="email">
      </div>

      <!-- Mot de passe commun -->
      <div class="input-group">
        <label>🔒 Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <!-- champ supplémentaire pour l'inscription : confirmation mot de passe (optionnel mais plus propre) -->
      <div class="input-group" id="confirmGroup" style="display: none;">
        <label>✓ Confirmer le mot de passe</label>
        <input type="password" id="confirmPwd" placeholder="Retapez votre mot de passe">
      </div>

      <!-- Vérification humaine (cliquez pour confirmer) -->
      <div class="human-check" id="humanCheckBlock">
        <div class="human-label">
          <span class="fake-checkbox" id="fakeCheckbox"></span>
          <span>🧠 Vérification humaine</span>
        </div>
        <span class="human-hint" id="humanHint">Cliquez pour confirmer</span>
      </div>

      <!-- Bouton principal (texte dynamique) -->
      <button type="submit" class="login-btn" id="actionBtn">
        <span>→</span> <span id="btnText">Se connecter</span>
      </button>
    </form>

    <!-- Mode invité -->
    <div class="guest-mode">
      <button class="guest-link" id="guestBtn">🎭 Continuer en mode invité</button>
      <div class="divider">
        <span class="divider-line"></span>
        <span>sans inscription</span>
        <span class="divider-line"></span>
      </div>
    </div>

    <div class="footer-note">
      ESP / UCAD - Licence 3 GLSI • Sécurité & mobilité
    </div>
  </div>
</div>

<div id="toastMsg" class="toast-msg">✨ message</div>

<script>
  // Éléments DOM
  const authSwitchBtns = document.querySelectorAll('.switch-btn');
  const confirmGroup = document.getElementById('confirmGroup');
  const actionBtn = document.getElementById('actionBtn');
  const btnTextSpan = document.getElementById('btnText');
  const form = document.getElementById('mainForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const confirmInput = document.getElementById('confirmPwd');
  const humanBlock = document.getElementById('humanCheckBlock');
  const fakeCheckbox = document.getElementById('fakeCheckbox');
  const humanHintSpan = document.getElementById('humanHint');
  const guestBtn = document.getElementById('guestBtn');
  const toast = document.getElementById('toastMsg');

  let currentMode = 'login';     // 'login' ou 'register'
  let humanVerified = false;

  // Helper toast
  function showMessage(text, isError = false) {
    toast.textContent = text;
    toast.style.backgroundColor = isError ? '#991b1b' : '#1e293b';
    toast.style.opacity = '1';
    setTimeout(() => {
      toast.style.opacity = '0';
    }, 2300);
  }

  // Mettre à jour l'affichage du toggle
  function updateUIMode() {
    if (currentMode === 'login') {
      confirmGroup.style.display = 'none';
      btnTextSpan.innerText = 'Se connecter';
      // optionnel: retirer required sur confirm pour éviter soucis
      if(confirmInput) confirmInput.required = false;
      // petite animation de style
    } else {
      confirmGroup.style.display = 'flex';
      btnTextSpan.innerText = "S'inscrire";
      if(confirmInput) confirmInput.required = true;
    }
    // mise à jour du style actif sur les boutons
    authSwitchBtns.forEach(btn => {
      if(btn.getAttribute('data-mode') === currentMode) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
  }

  // Gestion clic sur vérification humaine
  function toggleHumanVerification() {
    if (!humanVerified) {
      humanVerified = true;
      humanBlock.classList.add('verified');
      humanHintSpan.innerText = '✓ Humain vérifié';
      showMessage("✅ Vérification humaine réussie", false);
    } else {
      // Optionnel: on peut laisser l'utilisateur dévérifier? mieux de garder cohérence
      // mais souvent on ne permet pas de décochage. on va laisser actif
      // s'il reclique on ne fait rien ou on peut prévenir: déjà vérifié
      showMessage("✔ Déjà vérifié, vous pouvez continuer", false);
    }
  }

  // reset le check humain si nécessaire (optionnel : après mode invité)
  function resetHumanCheck() {
    humanVerified = false;
    humanBlock.classList.remove('verified');
    humanHintSpan.innerText = 'Cliquez pour confirmer';
  }

  // validation du formulaire selon mode
  function validateForm() {
    const email = emailInput.value.trim();
    const pwd = passwordInput.value.trim();

    if (!email) {
      showMessage("Veuillez entrer votre email", true);
      emailInput.focus();
      return false;
    }
    if (!email.includes('@') || !email.includes('.')) {
      showMessage("Email invalide (ex: nom@domaine.com)", true);
      return false;
    }
    if (!pwd) {
      showMessage("Mot de passe requis", true);
      passwordInput.focus();
      return false;
    }
    if (currentMode === 'register') {
      const confirmPwd = confirmInput.value.trim();
      if (!confirmPwd) {
        showMessage("Veuillez confirmer votre mot de passe", true);
        confirmInput.focus();
        return false;
      }
      if (pwd !== confirmPwd) {
        showMessage("Les mots de passe ne correspondent pas", true);
        return false;
      }
      if (pwd.length < 4) {
        showMessage("Le mot de passe doit comporter au moins 4 caractères", true);
        return false;
      }
    }
    if (!humanVerified) {
      showMessage("Veuillez compléter la vérification humaine (cliquez sur le badge)", true);
      return false;
    }
    return true;
  }

  // Soumission principale (connexion / inscription)
  function handleAuthSubmit(e) {
    e.preventDefault();
    if (!validateForm()) return;

    const email = emailInput.value.trim();
    const pwd = passwordInput.value.trim();

    if (currentMode === 'login') {
      // Simulation connexion
      showMessage(`🔐 Connexion en tant que ${email} (simulé)`, false);
      // Ici vous pourriez faire appel à une API réelle
      console.log("Connexion:", { email, pwd });
      // Petite redirection fictive (alerte pour l'expérience)
      setTimeout(() => {
        showMessage("Bienvenue sur TranspoBot 🤖", false);
      }, 800);
    } 
    else if (currentMode === 'register') {
      // Simulation inscription
      showMessage(`🎉 Inscription réussie pour ${email} !`, false);
      console.log("Inscription:", { email, pwd });
      // Option : basculer en mode connexion automatiquement pour fluidité
      setTimeout(() => {
        // changement doux en mode connexion
        currentMode = 'login';
        updateUIMode();
        resetHumanCheck();
        // On vide le champ confirm si besoin
        if(confirmInput) confirmInput.value = '';
        showMessage("✅ Compte créé, vous pouvez vous connecter", false);
      }, 1000);
    }
    // Optionnel: après action, on pourrait reset le check humain pour la prochaine action
    // resetHumanCheck(); // décommenter si on veut forcer re-vérification à chaque submit
  }

  // Mode invité
  function guestModeHandler() {
    // Reset des champs (optionnel mais sympa)
    emailInput.value = '';
    passwordInput.value = '';
    if(confirmInput) confirmInput.value = '';
    resetHumanCheck();
    // on peut éventuellement basculer en mode login par défaut
    if(currentMode !== 'login') {
      currentMode = 'login';
      updateUIMode();
    }
    showMessage("🎭 Navigation en mode invité — fonctionnalités limitées", false);
    // simulation: on pourrait afficher un dashboard fictif, mais pour la démo on reste sur la carte
    console.log("Mode invité activé");
  }

  // Initialisation des events
  function initEvents() {
    // bascule Connexion / Inscription
    authSwitchBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const mode = btn.getAttribute('data-mode');
        if (mode === 'login') {
          currentMode = 'login';
        } else if (mode === 'register') {
          currentMode = 'register';
        }
        updateUIMode();
        resetHumanCheck();  // on réinitialise la vérif humaine pour éviter les erreurs
        // Optionnel : nettoyer les champs de confirmation si nécessaire
        if(confirmInput) confirmInput.value = '';
        // petite indication
        showMessage(`Mode ${currentMode === 'login' ? 'Connexion' : 'Inscription'} activé`, false);
      });
    });

    // Vérification humaine: clic sur tout le bloc ou sur la checkbox
    humanBlock.addEventListener('click', (e) => {
      // éviter de déclencher si on clique sur le hint mais c'est ok
      e.stopPropagation();
      toggleHumanVerification();
    });
    // le style curseur pour indiquer cliquable
    humanBlock.style.cursor = 'pointer';
    fakeCheckbox.style.cursor = 'pointer';

    // soumission formulaire
    form.addEventListener('submit', handleAuthSubmit);

    // mode invité
    guestBtn.addEventListener('click', guestModeHandler);
  }

  // Initialisation responsive + fixe les bonnes valeurs
  function start() {
    updateUIMode();
    initEvents();
    // petits ajustements pour éviter tout débordement sur mobile (déjà géré par CSS)
    // On force le reset de la vérification humaine
    resetHumanCheck();
    // Ajout d'un placeholder plus clair
    emailInput.placeholder = "adresse@exemple.com";
    passwordInput.placeholder = "••••••••";
  }

  start();
</script>
</body>
</html>

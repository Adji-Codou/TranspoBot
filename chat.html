<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspoBot - Chat IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .message-user { background: linear-gradient(135deg, #3b82f6, #4f46e5); color: white; border-radius: 20px 20px 5px 20px; padding: 10px 16px; max-width: 80%; align-self: flex-end; }
        .message-bot { background: #f1f5f9; color: #1e293b; border-radius: 20px 20px 20px 5px; padding: 10px 16px; max-width: 80%; align-self: flex-start; }
        .typing span { animation: blink 1.4s infinite; display: inline-block; }
        @keyframes blink { 0%, 60%, 100% { opacity: 0.4; } 30% { opacity: 1; } }
        .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .data-table th, .data-table td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-5">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-robot text-white text-3xl"></i>
                    <div>
                        <h1 class="text-white text-2xl font-bold">TranspoBot Chat</h1>
                        <p class="text-blue-200 text-sm">Assistant IA pour la gestion de transport</p>
                    </div>
                </div>
            </div>
            
            <div id="chat-messages" class="h-[500px] overflow-y-auto p-5 flex flex-col gap-3 bg-slate-50">
                <div class="flex flex-col gap-3">
                    <div class="message-bot">
                        👋 Bonjour ! Je suis TranspoBot. Posez-moi vos questions sur :<br>
                        • Les véhicules (actifs, en maintenance)<br>
                        • Les chauffeurs<br>
                        • Les trajets et recettes<br>
                        • Les incidents<br>
                        • Les lignes
                    </div>
                </div>
            </div>
            
            <div class="p-4 border-t bg-white">
                <div class="flex gap-2">
                    <input type="text" id="question" placeholder="Posez votre question..." 
                           class="flex-1 border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="sendMessage()" class="bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <div class="flex justify-center gap-4 mt-3">
                    <button onclick="speakResponse()" class="text-sm bg-indigo-100 text-indigo-700 px-4 py-2 rounded-full">
                        <i class="fa-solid fa-volume-up"></i> Lire
                    </button>
                    <button onclick="stopSpeaking()" class="text-sm bg-red-100 text-red-600 px-4 py-2 rounded-full">
                        <i class="fa-solid fa-stop"></i> Arrêter
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://transpobot-fck0.onrender.com';
        let lastResponse = '';
        let currentSpeech = null;
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
        }
        
        function generateTable(data) {
            if (!data || !data.length) return '';
            const headers = Object.keys(data[0]);
            let html = '<div class="mt-3 overflow-x-auto"><table class="data-table"><thead><tr>';
            headers.forEach(h => html += `<th>${h.toUpperCase()}</th>`);
            html += '</tr></thead><tbody>';
            data.forEach(row => {
                html += '<tr>';
                headers.forEach(h => {
                    let val = row[h];
                    if (val === null) val = '-';
                    if (typeof val === 'number' && h.toLowerCase().includes('recette')) val = val.toLocaleString() + ' FCFA';
                    html += `<td>${escapeHtml(String(val))}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            return html;
        }
        
        async function sendMessage() {
            const input = document.getElementById('question');
            const question = input.value.trim();
            if (!question) return;
            
            const messagesDiv = document.getElementById('chat-messages');
            messagesDiv.innerHTML += `<div class="message-user">${escapeHtml(question)}</div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            input.value = '';
            
            messagesDiv.innerHTML += `<div class="message-bot typing"><span>...</span> <span>...</span> <span>...</span></div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });
                const data = await response.json();
                
                document.querySelector('.typing')?.remove();
                
                lastResponse = data.natural_response || "Je n'ai pas compris.";
                let tableHtml = (data.results && data.results.length) ? generateTable(data.results) : '';
                
                messagesDiv.innerHTML += `<div class="message-bot">${escapeHtml(lastResponse)}${tableHtml}</div>`;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } catch(e) {
                document.querySelector('.typing')?.remove();
                messagesDiv.innerHTML += `<div class="message-bot">❌ Erreur: ${e.message}</div>`;
            }
        }
        
        function speakResponse() {
            if (lastResponse && !lastResponse.includes("SELECT")) {
                if (currentSpeech) window.speechSynthesis.cancel();
                currentSpeech = new SpeechSynthesisUtterance(lastResponse);
                currentSpeech.lang = 'fr-FR';
                window.speechSynthesis.speak(currentSpeech);
            }
        }
        
        function stopSpeaking() { window.speechSynthesis.cancel(); }
        
        document.getElementById('question').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | TranspoBot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
        .tab-active { border-bottom: 2px solid #60a5fa; color: #60a5fa; }
        .input-glass { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s; }
        .input-glass:focus { border-color: #60a5fa; outline: none; box-shadow: 0 0 15px rgba(96,165,250,0.3); }
        .btn-glass { background: linear-gradient(135deg, #3b82f6, #2563eb); transition: all 0.3s; }
        .btn-glass:hover { transform: translateY(-2px); box-shadow: 0 10px 30px -5px rgba(59,130,246,0.5); }
        .floating-icon { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);">
    <div class="floating-icon absolute top-20 left-10 opacity-20 text-7xl"><i class="fa-solid fa-bus"></i></div>
    <div class="floating-icon absolute bottom-20 right-10 opacity-20 text-7xl" style="animation-delay: 2s;"><i class="fa-solid fa-truck"></i></div>
    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <div class="bg-gradient-to-br from-blue-500 to-indigo-600 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto shadow-xl">
                <i class="fa-solid fa-bus-simple text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mt-4">TranspoBot</h1>
            <p class="text-blue-300 text-sm mt-1">Gestion de transport par IA</p>
        </div>
        <div class="flex border-b border-white/20 mb-6">
            <button id="tab-login" onclick="showLoginTab()" class="flex-1 py-2 text-center font-medium text-white/70 tab-active transition-all">Connexion</button>
            <button id="tab-register" onclick="showRegisterTab()" class="flex-1 py-2 text-center font-medium text-white/70 transition-all">Inscription</button>
        </div>
        <div id="error-message" class="hidden bg-red-500/20 border border-red-500 text-red-300 px-4 py-2 rounded-xl text-sm mb-4"></div>
        <div id="success-message" class="hidden bg-green-500/20 border border-green-500 text-green-300 px-4 py-2 rounded-xl text-sm mb-4"></div>
        
        <!-- FORMULAIRE CONNEXION -->
        <div id="login-form" class="space-y-4">
            <input type="email" id="login-email" placeholder="Email" class="w-full input-glass rounded-xl px-4 py-3 text-sm">
            <input type="password" id="login-password" placeholder="Mot de passe" class="w-full input-glass rounded-xl px-4 py-3 text-sm">
            <div class="bg-white/5 rounded-xl p-4 border border-white/10">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-robot text-blue-400"></i>
                    <div class="flex-1"><p class="text-xs text-white/60">Vérification humaine</p></div>
                    <input type="checkbox" id="login-captcha" class="w-5 h-5 rounded">
                </div>
            </div>
            <button onclick="login()" class="w-full btn-glass text-white py-3 rounded-xl font-medium shadow-md">Se connecter</button>
        </div>
        
        <!-- FORMULAIRE INSCRIPTION -->
        <div id="register-form" class="space-y-4 hidden">
            <input type="text" id="register-name" placeholder="Nom complet" class="w-full input-glass rounded-xl px-4 py-3 text-sm">
            <input type="email" id="register-email" placeholder="Email" class="w-full input-glass rounded-xl px-4 py-3 text-sm">
            <input type="password" id="register-password" placeholder="Mot de passe" class="w-full input-glass rounded-xl px-4 py-3 text-sm">
            <input type="password" id="register-confirm-password" placeholder="Confirmer" class="w-full input-glass rounded-xl px-4 py-3 text-sm">
            <div class="bg-white/5 rounded-xl p-4 border border-white/10">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-robot text-blue-400"></i>
                    <div class="flex-1"><p class="text-xs text-white/60">Vérification humaine</p></div>
                    <input type="checkbox" id="register-captcha" class="w-5 h-5 rounded">
                </div>
            </div>
            <button onclick="register()" class="w-full btn-glass text-white py-3 rounded-xl font-medium shadow-md">S'inscrire</button>
        </div>
        
        <div class="mt-4 text-center">
            <button onclick="loginAsGuest()" class="text-blue-300 text-sm hover:text-blue-200 transition">Mode invité</button>
        </div>
        <p class="text-[10px] text-center text-white/30 mt-6">ESP / UCAD - Licence 3 GLSi</p>
    </div>
    
    <script>
        // Utilisateurs par défaut
        let users = JSON.parse(localStorage.getItem('transpobot_users') || '[{"fullname":"Admin ESP","email":"admin@esp.sn","password":"admin123"}]');
        
        function saveUsers(u) { localStorage.setItem('transpobot_users', JSON.stringify(u)); }
        
        function showError(msg) { 
            let d = document.getElementById('error-message'); 
            d.innerHTML = '<i class="fa-solid fa-circle-exclamation mr-2"></i> ' + msg; 
            d.classList.remove('hidden'); 
            setTimeout(() => d.classList.add('hidden'), 3000); 
        }
        
        function showSuccess(msg) { 
            let d = document.getElementById('success-message'); 
            d.innerHTML = '<i class="fa-solid fa-check-circle mr-2"></i> ' + msg; 
            d.classList.remove('hidden'); 
            setTimeout(() => d.classList.add('hidden'), 3000); 
        }
        
        function showLoginTab() { 
            document.getElementById('login-form').classList.remove('hidden'); 
            document.getElementById('register-form').classList.add('hidden'); 
            document.getElementById('tab-login').classList.add('tab-active'); 
            document.getElementById('tab-register').classList.remove('tab-active'); 
        }
        
        function showRegisterTab() { 
            document.getElementById('login-form').classList.add('hidden'); 
            document.getElementById('register-form').classList.remove('hidden'); 
            document.getElementById('tab-register').classList.add('tab-active'); 
            document.getElementById('tab-login').classList.remove('tab-active'); 
        }
        
        function login() { 
            let email = document.getElementById('login-email').value.trim(); 
            let pwd = document.getElementById('login-password').value; 
            let captcha = document.getElementById('login-captcha').checked; 
            
            if (!email || !pwd) return showError("Remplissez tous les champs"); 
            if (!captcha) return showError("Confirmez que vous n'êtes pas un robot"); 
            
            let user = users.find(u => u.email === email && u.password === pwd); 
            
            if (user) { 
                localStorage.setItem('transpobot_user', JSON.stringify({
                    name: user.fullname, 
                    email: user.email, 
                    loggedIn: true,
                    justLoggedIn: true
                })); 
                window.location.href = '/'; 
            } else { 
                showError("Email ou mot de passe incorrect"); 
            } 
        }
        
        function register() { 
            let name = document.getElementById('register-name').value.trim(); 
            let email = document.getElementById('register-email').value.trim(); 
            let pwd = document.getElementById('register-password').value; 
            let confirm = document.getElementById('register-confirm-password').value; 
            let captcha = document.getElementById('register-captcha').checked; 
            
            if (!name || !email || !pwd || !confirm) return showError("Remplissez tous les champs"); 
            if (pwd !== confirm) return showError("Mots de passe différents"); 
            if (pwd.length < 4) return showError("4 caractères minimum"); 
            if (!captcha) return showError("Confirmez le captcha"); 
            if (users.find(u => u.email === email)) return showError("Email déjà utilisé"); 
            
            users.push({ fullname: name, email: email, password: pwd }); 
            saveUsers(users); 
            showSuccess("Inscription réussie ! Connectez-vous"); 
            showLoginTab(); 
            document.getElementById('login-email').value = email; 
        }
        
        function loginAsGuest() { 
            localStorage.setItem('transpobot_user', JSON.stringify({
                name: "Invité", 
                email: "guest@transpobot.sn", 
                loggedIn: true,
                justLoggedIn: true
            })); 
            window.location.href = '/'; 
        }
        
        // Si déjà connecté, rediriger vers l'accueil
        if (localStorage.getItem('transpobot_user')) {
            try {
                const user = JSON.parse(localStorage.getItem('transpobot_user'));
                if (user.loggedIn) window.location.href = '/';
            } catch(e) {}
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TranspoBot - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: #666;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 12px;
        }

        .tab {
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            color: #999;
            transition: all 0.3s ease;
            padding-bottom: 8px;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 0.85rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .human-check {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 14px 16px;
            margin: 24px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .human-check.verified {
            background: #f0fdf4;
            border-color: #22c55e;
        }

        .human-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .checkbox-custom {
            width: 22px;
            height: 22px;
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .human-check.verified .checkbox-custom {
            background: #22c55e;
            border-color: #22c55e;
        }

        .human-check.verified .checkbox-custom::after {
            content: "✓";
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .human-text {
            font-weight: 500;
            color: #333;
            font-size: 0.9rem;
        }

        .human-hint {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .guest-mode {
            text-align: center;
            margin-top: 24px;
        }

        .guest-link {
            background: none;
            border: none;
            color: #667eea;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            color: #999;
            font-size: 0.7rem;
        }

        .error-msg, .success-msg {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
        }

        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .success-msg {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .error-msg.show, .success-msg.show {
            display: block;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .login-card {
                padding: 30px 24px;
            }

            .logo h1 {
                font-size: 1.6rem;
            }

            .tab {
                font-size: 1rem;
            }

            .input-group input {
                padding: 12px 14px;
                font-size: 0.9rem;
            }

            .human-check {
                padding: 12px;
                flex-wrap: wrap;
                gap: 10px;
            }

            .human-left {
                gap: 10px;
            }

            .human-text {
                font-size: 0.85rem;
            }

            .human-hint {
                font-size: 0.75rem;
            }

            .login-btn {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="flex items-center justify-center gap-2 mb-2">
                    <div class="bg-gradient-to-tr from-blue-500 to-indigo-600 p-2 rounded-xl">
                        <i class="fa-solid fa-bus-simple text-white text-xl"></i>
                    </div>
                </div>
                <h1>TranspoBot</h1>
                <p>Gestion de transport par IA</p>
            </div>

            <div class="tabs">
                <div class="tab active" data-mode="login">Connexion</div>
                <div class="tab" data-mode="register">Inscription</div>
            </div>

            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>

            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="adresse@exemple.com">
                </div>

                <div class="input-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" placeholder="Mot de passe">
                </div>

                <div class="human-check" id="humanCheck">
                    <div class="human-left">
                        <div class="checkbox-custom"></div>
                        <span class="human-text">Vérification humaine</span>
                    </div>
                    <span class="human-hint" id="humanHint">Cliquez pour confirmer</span>
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    <i class="fa-solid fa-arrow-right"></i> Se connecter
                </button>
            </form>

            <div class="guest-mode">
                <button class="guest-link" id="guestBtn">Continuer en mode invité</button>
            </div>

            <div class="footer">
                ESP / UCAD - Licence 3 GLSI
            </div>
        </div>
    </div>

    <script>
        // Configuration de connexion
        const VALID_EMAIL = "adjicoudoignaz@gmail.com";
        const VALID_PASSWORD = "Dadja054";

        let currentMode = "login";
        let humanVerified = false;

        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const submitBtn = document.getElementById("submitBtn");
        const humanCheckDiv = document.getElementById("humanCheck");
        const humanHint = document.getElementById("humanHint");
        const errorMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");
        const guestBtn = document.getElementById("guestBtn");
        const tabs = document.querySelectorAll(".tab");

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add("show");
            successMsg.classList.remove("show");
            setTimeout(() => errorMsg.classList.remove("show"), 3000);
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.classList.add("show");
            errorMsg.classList.remove("show");
            setTimeout(() => successMsg.classList.remove("show"), 3000);
        }

        // Vérification humaine
        humanCheckDiv.addEventListener("click", function() {
            if (!humanVerified) {
                humanVerified = true;
                humanCheckDiv.classList.add("verified");
                humanHint.textContent = "✓ Vérifié";
                showSuccess("Vérification humaine réussie");
            }
        });

        // Changer mode Connexion/Inscription
        tabs.forEach(tab => {
            tab.addEventListener("click", function() {
                tabs.forEach(t => t.classList.remove("active"));
                this.classList.add("active");
                currentMode = this.getAttribute("data-mode");
                
                if (currentMode === "login") {
                    submitBtn.innerHTML = '<i class="fa-solid fa-arrow-right"></i> Se connecter';
                } else {
                    submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> S\'inscrire';
                }
                
                humanVerified = false;
                humanCheckDiv.classList.remove("verified");
                humanHint.textContent = "Cliquez pour confirmer";
                emailInput.value = "";
                passwordInput.value = "";
                errorMsg.classList.remove("show");
                successMsg.classList.remove("show");
            });
        });

        // Gestion du formulaire
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                showError("Veuillez remplir tous les champs");
                return;
            }
            
            if (!humanVerified) {
                showError("Veuillez compléter la vérification humaine");
                return;
            }
            
            if (currentMode === "login") {
                if (email === VALID_EMAIL && password === VALID_PASSWORD) {
                    showSuccess("Connexion réussie ! Redirection...");
                    localStorage.setItem('transpobot_user', JSON.stringify({
                        email: email,
                        name: email.split('@')[0],
                        loggedIn: true,
                        justLoggedIn: true
                    }));
                    setTimeout(() => {
                        window.location.href = "/";
                    }, 1500);
                } else {
                    showError("Email ou mot de passe incorrect");
                }
            } else {
                if (email && password.length >= 4) {
                    showSuccess("Inscription réussie ! Redirection vers la connexion...");
                    setTimeout(() => {
                        tabs[0].click();
                    }, 2000);
                } else {
                    showError("Mot de passe trop court (minimum 4 caractères)");
                }
            }
        });
        
        // Mode invité
        guestBtn.addEventListener("click", function() {
            localStorage.setItem('transpobot_user', JSON.stringify({
                name: "Invité",
                loggedIn: true,
                justLoggedIn: true
            }));
            showSuccess("Mode invité - Redirection...");
            setTimeout(() => {
                window.location.href = "/";
            }, 1000);
        });
        
        // Remplir automatiquement pour test (optionnel)
        emailInput.value = "adjicoudoignaz@gmail.com";
        passwordInput.value = "Dadja054";
    </script>
</body>
</html>
